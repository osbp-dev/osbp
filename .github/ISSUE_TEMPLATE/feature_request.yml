name: Feature request
description: Propose an addition or change to the OSBP protocol or tooling.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        OSBP is pre-1.0. Breaking changes are batched into planned releases; additive changes ship more freely. See [ROADMAP.md](../blob/main/ROADMAP.md) and [GOVERNANCE.md](../blob/main/GOVERNANCE.md) before proposing.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction in the current spec or tooling.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Change kind
      description: Is this additive, or would it require changing or removing existing behavior?
      options:
        - Additive (new field, new optional tool, new adapter method)
        - Breaking (renames, removals, changed required shapes)
        - Not sure
    validations:
      required: true
